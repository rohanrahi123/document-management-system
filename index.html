<!DOCTYPE html>
<html>
<head>
    <title>Government Document API Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; }

        #fileList {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            background: white;
        }

        #detailsSection {
            background: white;
            padding: 15px;
            border-radius: 5px;
            min-height: 250px;
        }
    </style>
</head>

<body class="container mt-4">

<h2 class="mb-4">Government Document API Dashboard</h2>

<!-- Upload Section -->
<div class="card p-3 mb-4">
    <h5>Upload Document</h5>

    <input type="file" id="fileInput" class="form-control mb-2">
    <button id="uploadBtn" onclick="uploadDocument()" class="btn btn-success">
        Upload
    </button>

    <div id="uploadStatus" class="mt-3" style="display:none;"></div>
</div>

<!-- Search Section -->
<div class="card p-3 mb-4">
    <h5>Search Document</h5>

    <div class="input-group">
        <input type="text" id="searchInput" class="form-control"
               placeholder="Enter keyword (Invoice No, Aadhaar, PAN, etc)">
        <button onclick="searchDocument()" class="btn btn-primary">
            Search
        </button>
    </div>
</div>

<div class="row">

    <!-- File List -->
    <div class="col-md-4">
        <h5>Uploaded Files</h5>
        <div id="fileList">Loading...</div>
    </div>

    <!-- Details -->
    <div class="col-md-8">
        <h5>Document Details</h5>

        <div id="detailsSection">
            <p>Select a document to view details.</p>
        </div>

        <button id="backBtn" onclick="goBack()"
                class="btn btn-secondary mt-2"
                style="display:none;">
            Back
        </button>
    </div>

</div>

<script>

// ================= Upload =================
async function uploadDocument() {

    const fileInput = document.getElementById("fileInput");
    const statusDiv = document.getElementById("uploadStatus");
    const uploadBtn = document.getElementById("uploadBtn");

    if (!fileInput.files.length) {
        alert("Please select a file.");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    statusDiv.style.display = "block";
    statusDiv.className = "alert alert-info";
    statusDiv.innerHTML = `
        <div class="d-flex align-items-center">
            <div class="spinner-border spinner-border-sm me-2"></div>
            Processing document...
        </div>
    `;

    uploadBtn.disabled = true;

    try {
        const response = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            statusDiv.className = "alert alert-success";
            statusDiv.innerHTML = "Document uploaded successfully.";

            fileInput.value = "";
            loadDocuments();

            setTimeout(() => {
                statusDiv.style.display = "none";
            }, 3000);

        } else {
            statusDiv.className = "alert alert-danger";
            statusDiv.innerHTML = result.error;
        }

    } catch (error) {
        statusDiv.className = "alert alert-danger";
        statusDiv.innerHTML = "Server internal error.";
    }

    uploadBtn.disabled = false;
}


// ================= Load Documents =================
async function loadDocuments() {

    const response = await fetch("/documents");
    const data = await response.json();

    const fileList = document.getElementById("fileList");
    fileList.innerHTML = "";

    if (!data.length) {
        fileList.innerHTML = "<p>No documents uploaded.</p>";
        return;
    }

    data.forEach(doc => {
        fileList.innerHTML += `
            <div class="border-bottom pb-2 mb-2">
                <strong>${doc.file_name}</strong><br>
                <small>${doc.document_type}</small><br>

                <button class="btn btn-sm btn-primary mt-1"
                        onclick="viewDocument('${doc.id}')">
                    View
                </button>

                <button class="btn btn-sm btn-danger mt-1"
                        onclick="deleteDocument('${doc.id}')">
                    Delete
                </button>
            </div>
        `;
    });
}


// ================= View Document =================
async function viewDocument(id) {

    const response = await fetch("/document/" + id);
    const doc = await response.json();

    const detailsSection = document.getElementById("detailsSection");
    const backBtn = document.getElementById("backBtn");

    backBtn.style.display = "inline-block";

    let table = `
        <table class="table table-bordered">
            <tr><th>ID</th><td>${doc.id}</td></tr>
            <tr><th>File Name</th><td>${doc.file_name}</td></tr>
            <tr><th>Document Type</th><td>${doc.document_type}</td></tr>
    `;

    if (doc.fields) {
        for (const key in doc.fields) {
            table += `<tr><th>${key}</th><td>${JSON.stringify(doc.fields[key]).replace(/[\[\]"]/g, '')}</td></tr>`;
        }
    }

    table += `</table>

        <button class="btn btn-warning me-2"
                onclick="toggleFullText()">
            Full Details
        </button>

        <a href="/preview/${doc.file_name}" target="_blank"
           class="btn btn-info me-2">
           Preview PDF
        </a>

        <div id="fullTextSection"
             style="display:none; margin-top:15px;
                    border:1px solid #ccc;
                    padding:10px;
                    max-height:300px;
                    overflow-y:auto;
                    white-space: pre-wrap;">
        </div>
    `;

    detailsSection.innerHTML = table;

    window.currentFullText = doc.full_text || "No readable text found.";
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    loadDocuments();
}


// ================= Toggle Full Text =================
function toggleFullText() {

    const section = document.getElementById("fullTextSection");

    if (section.style.display === "none") {
        section.style.display = "block";
        section.innerText = window.currentFullText;
    } else {
        section.style.display = "none";
    }
}


// ================= Delete =================
async function deleteDocument(id) {

    if (!confirm("Are you sure you want to delete this document?"))
        return;

    await fetch("/delete/" + id, { method: "DELETE" });

    loadDocuments();
    goBack();
}


// ================= Search =================
async function searchDocument() {

    const keyword = document.getElementById("searchInput").value;

    if (!keyword) {
        loadDocuments();
        return;
    }

    const response = await fetch("/search?keyword=" + keyword);
    const data = await response.json();

    const fileList = document.getElementById("fileList");
    fileList.innerHTML = "";

    if (data.message || data.length === 0) {

    fileList.innerHTML = `
        <div class="p-2">
            <p>No document found.</p>
            <button class="btn btn-secondary btn-sm"
                    onclick="goBackToMain()">
                Back
            </button>
        </div>
    `;
    return;
}

    data.forEach(doc => {
        fileList.innerHTML += `
            <div class="border-bottom pb-2 mb-2">
                <strong>${doc.file_name}</strong><br>
                <small>${doc.document_type}</small><br>

                <button class="btn btn-sm btn-primary mt-1"
                        onclick="viewDocument('${doc.id}')">
                    View
                </button>

                <button class="btn btn-sm btn-danger mt-1"
                        onclick="deleteDocument('${doc.id}')">
                    Delete
                </button>
            </div>
        `;
    });
}
function goBackToMain() {
    document.getElementById("searchInput").value = "";
    loadDocuments();
}

// ================= Back =================
function goBack() {
    document.getElementById("detailsSection").innerHTML =
        "<p>Select a document to view details.</p>";
    document.getElementById("backBtn").style.display = "none";
}
fetch("http://localhost:5000/api/document?key=ABCDE1234F", {
    headers: {
        "x-api-key": "mysecureapikey123"
    }
})
.then(res => res.json())
.then(data => console.log(data));

// Init
loadDocuments();

</script>

</body>
</html>
